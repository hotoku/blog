<div
  class="amazon-card"
  style="
    border: 1px solid #ddd;
    padding: 5px;
    border-radius: 8px;
    display: inline-block;
    vertical-align: top;
    width: 28%;
    margin: 1%;
    box-sizing: border-box;
  "
>
  <div class="amazon-info" style="text-align: center">
    <p
      style="
        margin: 0 0 5px 0;
        font-weight: bold;
        font-size: 0.9em;
        line-height: 1.3;
      "
    >
      <a
        href="{{ include.url }}"
        target="_blank"
        rel="noopener"
        style="text-decoration: none; color: #333"
      >
        {{ include.title | escape }}
      </a>
    </p>
    <a
      href="{{ include.url }}"
      target="_blank"
      rel="noopener"
      class="amazon-button-mobile-hide"
      style="
        background: #f0c14b;
        border: 1px solid #a88734;
        padding: 5px 15px;
        border-radius: 3px;
        color: #111;
        text-decoration: none;
        font-size: 0.8em;
        display: inline-block;
      "
    >
      Amazonで見る
    </a>
  </div>
</div>
